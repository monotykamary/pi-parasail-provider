name: Update Parasail Models

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and update models
        env:
          PARASAIL_API_KEY: ${{ secrets.PARASAIL_API_KEY }}
        run: node scripts/update-models.js

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'feat: update parasail models from API'
          title: 'feat: update parasail models from API'
          body: |
            Automated update of Parasail models from https://api.parasail.io/v1/models

            Changes include:
            - Updated models in `models.json`
            - Updated model table in `README.md`
            - Patch overrides in `patch.json` are preserved
          branch: update-parasail-models
          delete-branch: true
